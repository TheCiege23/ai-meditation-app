<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ChimAura — Offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { margin: 0; opacity: 0.9; font-size: 0.9375rem; max-width: 20rem; }
    .reload {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .reload:hover { background: #7dd3fc; }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Some features need the internet.</p>
  <button type="button" class="reload" onclick="window.location.reload()">Try again</button>
  <script>
    window.addEventListener("online", function () { window.location.reload(); });
  </script>
</body>
</html>
